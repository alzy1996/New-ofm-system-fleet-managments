name: Deploy ERP Nexus to Firebase

# Deploys Firebase Hosting + Firestore rules for project procurement-erp-6e271.
#
# SETUP (one time):
#  1. In the Firebase/Google Cloud console create a service account with roles
#     "Firebase Hosting Admin" + "Cloud Datastore Owner" (or "Firebase Admin"),
#     and download its JSON key.
#  2. In GitHub → repo Settings → Secrets and variables → Actions → New secret:
#       Name:  FIREBASE_SERVICE_ACCOUNT
#       Value: (paste the full service-account JSON)
#  3. Push to the default branch (claude/erp-nexus-procurement-6lS85), or run
#     this workflow manually (Actions tab → Run workflow).

on:
  workflow_dispatch: {}
  push:
    branches: [ claude/erp-nexus-procurement-6lS85 ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key (if provided)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/sa.json"
            node -e "const p=require(process.env.HOME+'/sa.json'); if(!p.project_id) throw new Error('Invalid service-account JSON'); console.log('Service account OK -> project_id:', p.project_id);"
          else
            echo "No FIREBASE_SERVICE_ACCOUNT secret set — will rely on FIREBASE_TOKEN."
          fi

      - name: Deploy hosting + Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -f "$HOME/sa.json" ]; then export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"; fi
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Authenticating with FIREBASE_TOKEN (CI token)…"
            firebase deploy --only hosting,firestore:rules \
              --project procurement-erp-6e271 --non-interactive \
              --token "$FIREBASE_TOKEN"
          else
            echo "Authenticating with service account (GOOGLE_APPLICATION_CREDENTIALS)…"
            firebase deploy --only hosting,firestore:rules \
              --project procurement-erp-6e271 --non-interactive
          fi
