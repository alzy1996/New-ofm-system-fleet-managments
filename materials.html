<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ERP Nexus — Materials</title>
<meta name="theme-color" content="#E8612C">
<meta name="description" content="ERP Nexus — Smart Materials Catalog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nexus">
<link rel="manifest" href="nexus-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="nexus-core.js"></script>
<style>
/* ============================================================
   ERP NEXUS — SHARED DESIGN SYSTEM (canonical, replicated per module)
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#E8612C;--primary-d:#C44D1E;--primary-l:rgba(232,97,44,.09);
  --blue:#2D7DD2;--blue-l:rgba(45,125,210,.1);
  --green:#1DB06A;--amber:#E8930A;--red:#E5484D;--purple:#7C3AED;
  --bg:#F4F5F9;--surface:#FFFFFF;--surface-2:#FAFBFE;
  --text:#0F1117;--muted:#7B8299;--border:#E7EAF2;
  --sh-sm:0 1px 3px rgba(15,17,23,.06);
  --sh:0 1px 3px rgba(15,17,23,.06),0 6px 18px rgba(15,17,23,.05);
  --sh-lg:0 20px 40px rgba(15,17,23,.16);
  --r:12px;--r-sm:8px;--r-lg:16px;
  --glass:rgba(255,255,255,.72);
}
[data-theme="dark"]{
  --bg:#0E1016;--surface:#171A22;--surface-2:#1E222C;
  --text:#EEF1F7;--muted:#8A92A6;--border:#272C38;
  --primary-l:rgba(232,97,44,.16);--blue-l:rgba(45,125,210,.18);
  --glass:rgba(23,26,34,.72);
  --sh-sm:0 1px 3px rgba(0,0,0,.4);--sh:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ---- App shell ---- */
.shell{display:flex;height:100vh;height:100dvh;}
.sb{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;height:100dvh;transition:width .2s;}
.sb-head{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);}
.sb-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),#F4863F);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;flex-shrink:0;box-shadow:0 4px 12px rgba(232,97,44,.35);}
.sb-brand{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.sb-brand span{color:var(--primary);}
.sb-ver{font-size:10px;color:var(--muted);font-weight:600;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-sec{padding:14px 16px 6px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:2px 9px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:background .15s,color .15s;}
.nav-i:hover{background:var(--surface-2);color:var(--text);}
.nav-i.active{background:var(--primary-l);color:var(--primary);font-weight:700;}
.nav-ico{font-size:17px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:9px;}
.sb-foot{padding:12px;border-top:1px solid var(--border);}
.u-card{display:flex;align-items:center;gap:10px;}
.u-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#5AA0E6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;}
.u-name{font-size:12.5px;font-weight:700;}
.u-role{font-size:10.5px;color:var(--muted);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .15s;}
.icon-btn:hover{color:var(--primary);border-color:var(--primary);}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:30;}
.tb-title h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.tb-title p{font-size:11.5px;color:var(--muted);}
.search-wrap{flex:1;max-width:480px;position:relative;}
.search-box{width:100%;height:40px;padding:0 14px 0 40px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface-2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);background:var(--surface);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none;}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 6px;background:var(--surface);}
.tb-actions{display:flex;align-items:center;gap:9px;margin-left:auto;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(29,176,106,.1);border:1px solid rgba(29,176,106,.25);color:var(--green);padding:6px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.live-pill.offline{background:rgba(232,147,10,.1);border-color:rgba(232,147,10,.3);color:var(--amber);}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(1.6);}}

.content{flex:1;overflow-y:auto;padding:20px 22px 90px;}
.page-grid{max-width:1440px;margin:0 auto;}

/* ---- Cards / layout ---- */
.grid-2{display:grid;grid-template-columns:1.15fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-t{font-size:13.5px;font-weight:800;letter-spacing:-.2px;}
.card-t small{font-weight:600;color:var(--muted);font-size:11px;margin-left:6px;}
.link-btn{font-size:11.5px;font-weight:700;color:var(--primary);background:none;border:none;}

/* ---- Action center ---- */
.action-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:11px;margin-bottom:9px;transition:border-color .15s;}
.action-item:hover{border-color:var(--primary);}
.ai-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-body{flex:1;min-width:0;}
.ai-title{font-size:13px;font-weight:700;}
.ai-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.ai-actions{display:flex;gap:6px;flex-shrink:0;}
.btn{border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;padding:8px 14px;transition:filter .15s,background .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-pri{background:var(--primary);color:#fff;}.btn-pri:hover{background:var(--primary-d);}
.btn-ok{background:var(--green);color:#fff;}.btn-ok:hover{filter:brightness(.93);}
.btn-no{background:rgba(229,72,77,.12);color:var(--red);}.btn-no:hover{background:rgba(229,72,77,.2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:6px 11px;font-size:11px;}

/* ---- badges & chips ---- */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;}
.b-green{background:rgba(29,176,106,.12);color:#0e7a4a;}
.b-amber{background:rgba(232,147,10,.13);color:#a06003;}
.b-red{background:rgba(229,72,77,.12);color:#c0292e;}
.b-blue{background:var(--blue-l);color:#1a5fa0;}
.b-grey{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.b-purple{background:rgba(124,58,237,.12);color:#6d28d9;}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ---- Mobile bottom nav ---- */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50;justify-content:space-around;}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:9.5px;font-weight:700;}
.bn-i.active{color:var(--primary);}
.bn-i .nav-ico{font-size:19px;}

/* ---- Search overlay results ---- */
.search-results{position:absolute;top:46px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh-lg);padding:8px;max-height:60vh;overflow-y:auto;display:none;z-index:40;}
.search-results.open{display:block;}
.sr-group{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 4px;}
.sr-i{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;}
.sr-i:hover{background:var(--surface-2);}
.sr-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sr-name{font-size:12.5px;font-weight:600;}.sr-meta{font-size:10.5px;color:var(--muted);}
.sr-ai{font-size:11.5px;color:var(--primary);font-weight:700;padding:8px 10px;}

.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;padding:12px 14px;box-shadow:var(--sh-lg);font-size:12.5px;font-weight:600;min-width:240px;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateX(120%);}to{transform:translateX(0);}}

/* ---- modal (from purchaserequests) ---- */
.overlay{position:fixed;inset:0;background:rgba(8,10,16,.45);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:120;padding:18px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:pop .2s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-t{font-size:15px;font-weight:800;}
.modal-b{padding:18px;}
.modal-f{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.fld input,.fld select,.fld textarea{width:100%;min-height:40px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.fld textarea{min-height:84px;resize:vertical;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}

/* ---- segmented control (from purchaserequests) ---- */
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;}
.seg button{border:none;background:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;color:var(--muted);}
.seg button.on{background:var(--primary);color:#fff;}

@media(max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr;}}
@media(max-width:760px){
  .sb{display:none;}
  .bottom-nav{display:flex;}
  .topbar{padding:10px 14px;}
  .tb-title{display:none;}
  .search-kbd{display:none;}
  .content{padding:14px 14px 90px;}
  .live-pill span{display:none;}
}

/* ============================================================
   MODULE-SPECIFIC: Materials Catalog
   ============================================================ */

/* ---- Toolbar ---- */
.mat-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.mat-toolbar .seg{flex-shrink:0;}
.mat-count{font-size:12px;color:var(--muted);font-weight:600;margin-left:4px;}

/* ---- Layout: filter sidebar + catalog area ---- */
.mat-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start;}

/* ---- Filter sidebar ---- */
.filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh-sm);position:sticky;top:0;}
.filter-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.filter-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.filter-clear{font-size:11px;font-weight:700;color:var(--primary);background:none;border:none;}
.filter-sec{margin-bottom:14px;}
.filter-sec-label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;display:block;}
.filter-check{display:flex;align-items:center;gap:7px;padding:5px 0;cursor:pointer;font-size:12.5px;font-weight:600;}
.filter-check input[type="checkbox"]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.filter-check .f-count{margin-left:auto;font-size:10.5px;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:1px 7px;}
.price-range{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.price-range input{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface-2);color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.price-range input:focus{border-color:var(--primary);}

/* ---- Catalog grid view ---- */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

/* ---- Material card ---- */
.mat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s;position:relative;}
.mat-card:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.mat-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-l);}
.mat-card-check{position:absolute;top:12px;right:12px;}
.mat-card-check input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;}
.mat-card-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px;padding-right:28px;}
.mat-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mat-card-info{min-width:0;flex:1;}
.mat-card-name{font-size:13px;font-weight:700;line-height:1.35;margin-bottom:3px;}
.mat-card-cat{font-size:11px;color:var(--muted);font-weight:600;}
.mat-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.mat-price{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--primary);cursor:pointer;border-radius:5px;padding:1px 3px;transition:background .12s;}
.mat-price:hover{background:var(--primary-l);}
.mat-price-unit{font-size:11px;color:var(--muted);font-weight:600;}
.mat-price-date{font-size:10.5px;color:var(--muted);}
.mat-price-input{font-size:16px;font-weight:800;color:var(--primary);border:2px solid var(--primary);border-radius:6px;padding:2px 7px;background:var(--surface);font-family:inherit;width:120px;outline:none;}
.mat-stock-row{margin-bottom:10px;}
.mat-stock-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.mat-stock-text{font-weight:700;}
.mat-stock-reorder{color:var(--muted);}
.mat-progress{height:6px;border-radius:3px;background:var(--border);overflow:hidden;}
.mat-progress-bar{height:100%;border-radius:3px;transition:width .3s;}
.mat-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.mat-actions{display:flex;gap:6px;flex-wrap:wrap;}
.mat-actions .btn{flex:1;min-width:0;justify-content:center;font-size:10.5px;padding:6px 8px;}

/* ---- Table view ---- */
.mat-table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);box-shadow:var(--sh-sm);}
.mat-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.mat-table thead tr{position:sticky;top:0;background:var(--surface-2);z-index:2;}
.mat-table th{padding:11px 13px;text-align:left;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);white-space:nowrap;}
.mat-table th.sortable{cursor:pointer;user-select:none;}
.mat-table th.sortable:hover{color:var(--primary);}
.mat-table tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
.mat-table tbody tr:last-child{border-bottom:none;}
.mat-table tbody tr:nth-child(even){background:var(--surface-2);}
.mat-table tbody tr:hover{background:var(--primary-l);}
.mat-table tbody tr.selected{background:var(--primary-l);}
.mat-table td{padding:10px 13px;vertical-align:middle;}
.mat-table td.td-name{font-weight:700;max-width:200px;}
.mat-table td.td-price{font-weight:800;color:var(--primary);cursor:pointer;white-space:nowrap;}
.mat-table td.td-price:hover{text-decoration:underline;}
.tbl-ico{font-size:17px;}
.tbl-check{width:36px;text-align:center;}
.tbl-check input[type="checkbox"]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer;}
.tbl-progress{width:80px;height:6px;border-radius:3px;background:var(--border);overflow:hidden;display:inline-block;vertical-align:middle;}
.tbl-progress-bar{height:100%;border-radius:3px;}
.tbl-actions{display:flex;gap:5px;flex-wrap:nowrap;}

/* ---- Bulk action bar ---- */
.bulk-bar{position:sticky;bottom:8px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg);padding:12px 18px;display:none;align-items:center;gap:12px;z-index:20;margin-top:12px;}
.bulk-bar.open{display:flex;}
.bulk-count{font-size:13px;font-weight:800;color:var(--primary);flex:1;}
.bulk-dismiss{font-size:13px;color:var(--muted);background:none;border:none;font-weight:700;}

/* ---- Empty state ---- */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state .es-ico{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:13px;font-weight:600;}

/* ---- History modal list ---- */
.hist-list{display:flex;flex-direction:column;gap:0;}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-size:12px;color:var(--muted);font-weight:600;min-width:90px;}
.hist-price{font-size:14px;font-weight:800;color:var(--primary);}
.hist-supplier{font-size:11px;color:var(--muted);max-width:160px;text-align:right;}
.hist-delta{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.hist-delta.up{background:rgba(229,72,77,.12);color:var(--red);}
.hist-delta.dn{background:rgba(29,176,106,.12);color:#0e7a4a;}
.hist-delta.flat{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}

/* ---- filter panel toggle on mobile ---- */
.filter-toggle-btn{display:none;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--muted);gap:6px;align-items:center;}
.filter-toggle-btn:hover{color:var(--primary);border-color:var(--primary);}

<body>
<div class="shell">

  <aside class="sb" id="sidebar" aria-label="Site navigation"></aside>

        <div class="search-results" id="searchResults" role="listbox"></div>

    </header>

    <div class="content" id="mainContent">

            <button id="vTable" onclick="setView('table')" role="tab" aria-selected="false">☰ Table View</button>

/* ---- Helpers ---- */
/** Simple query selector shorthand */
function $(s,r){return (r||document).querySelector(s);}
/** Create a DOM element with optional class and text content */
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
/** Format a number as OMR currency string */
function fmtOMR(n){return Number(n).toLocaleString('en-OM',{minimumFractionDigits:0,maximumFractionDigits:3});}
/** Show a toast notification that auto-dismisses after 3.5 s */
function toast(msg){
  var w=$('#toastWrap');
  var t=el('div','toast');
  t.textContent=msg;
  w.appendChild(t);
  setTimeout(function(){
    t.style.opacity='0';
    t.style.transition='opacity .3s';
    setTimeout(function(){t.remove();},300);
  },3500);
}
/** Count pending purchase requests */
function pendingPRs(){return SEED.prs.filter(function(p){return /Level|Submitted/.test(p.stage);}).length;}

/* ---- Theme ---- */
/** Apply light or dark theme to the document root */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');
  var b=$('#themeBtn');
  if(b){b.textContent=t==='dark'?'☀️':'🌙';}
  localStorage.setItem('nexus-theme',t);
}
/** Initialise theme from localStorage or OS preference */
function initTheme(){
  var saved=localStorage.getItem('nexus-theme');
  if(!saved){
    saved=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  }
  applyTheme(saved);
  var b=$('#themeBtn');
  if(b){
    b.onclick=function(){
      var cur=document.documentElement.getAttribute('data-theme');
      applyTheme(cur==='dark'?'light':'dark');
    };
  }
}

/* ---- Shell rendering (sidebar + bottom nav) ---- */
/** Render the sidebar navigation and bottom mobile nav */
function renderShell(){
  var sb=$('#sidebar');

  var body='';
  NAV.forEach(function(n){
    if(n.sec){body+='<div class="sb-sec">'+n.sec+'</div>';return;}
    var badge='';
    if(n.badge==='pr'&&pendingPRs()){badge='<span class="nav-badge">'+pendingPRs()+'</span>';}
    if(n.badge==='notif'){badge='<span class="nav-badge">5</span>';}
    body+='<a class="nav-i'+(n.id===CURRENT?' active':'')+'" href="'+n.href+'"><span class="nav-ico">'+n.ico+'</span>'+n.label+badge+'</a>';
  });

  sb.innerHTML=head+body+foot;
  var bn=$('#bottomNav');
  if(bn){
    var h='';
    BOTTOM.forEach(function(id){
      var n=NAV.find(function(x){return x.id===id;});
      if(!n){return;}
      h+='<a class="bn-i'+(id===CURRENT?' active':'')+'" href="'+n.href+'"><span class="nav-ico">'+n.ico+'</span>'+n.label.split(' ')[0]+'</a>';
    });
    bn.innerHTML=h;
  }
}
/** Handle sign out action */
function signOut(){if(window.Nexus){Nexus.logout();}else{toast('Signed out');}}

/* ---- Live connection indicator ---- */
/** Watch browser online/offline events and update the live pill */
function initLive(){
  function set(on){
    var p=$('#livePill');
    if(!p){return;}
    if(on){
      p.classList.remove('offline');
      p.innerHTML='<span class="live-dot"></span><span>Live</span>';
    }else{
      p.classList.add('offline');
      p.innerHTML='<span class="live-dot"></span><span>Offline</span>';
    }
  }
  window.addEventListener('online',function(){set(true);toast('Reconnected — syncing');});
  window.addEventListener('offline',function(){set(false);});
  set(navigator.onLine);
  if(db){
    try{db.collection('nexus_meta').doc('heartbeat').onSnapshot(function(){},function(){});}catch(e){}
  }
}

/* ---- Global search ---- */
/** Build a flat search index from all SEED collections */
function buildSearchIndex(){
  var ix=[];
  SEED.materials.forEach(function(m){
    ix.push({grp:'Materials',ico:'📦',cls:'b-blue',name:m.name,meta:m.cat+' · '+fmtOMR(m.price)+' OMR/'+m.unit,href:'materials.html'});
  });
  SEED.suppliers.forEach(function(s){
    ix.push({grp:'Suppliers',ico:'🏭',cls:'b-green',name:s.name,meta:s.loc+' · Score '+s.score,href:'suppliers.html'});
  });
  SEED.offers.forEach(function(o){
    ix.push({grp:'Offers',ico:'🏷️',cls:'b-amber',name:o.item,meta:o.supplier+' · '+fmtOMR(o.price)+' OMR',href:'offers.html'});
  });
  SEED.prs.forEach(function(p){
    ix.push({grp:'Purchase Requests',ico:'📋',cls:'b-grey',name:p.id+' — '+p.desc,meta:p.stage+' · '+fmtOMR(p.amount)+' OMR',href:'purchaserequests.html'});
  });
  return ix;
}
/** Initialise the global search box with live results dropdown */
function initSearch(){
  var box=$('#globalSearch');
  var res=$('#searchResults');
  var ix=buildSearchIndex();
  function run(q){
    q=q.trim().toLowerCase();
    if(!q){res.classList.remove('open');return;}
    var hits=ix.filter(function(i){return (i.name+' '+i.meta).toLowerCase().indexOf(q)>-1;}).slice(0,12);
    var groups={};
    hits.forEach(function(h){
      if(!groups[h.grp]){groups[h.grp]=[];}
      groups[h.grp].push(h);
    });
    var html='';
    if(q.indexOf('crane')>-1||q.indexOf('150')>-1){
      html+='<div class="sr-ai">💡 Did you mean: Crawler Crane 150T?</div>';
    }
    if(!hits.length){
      html+='<div class="sr-ai">No matches for "'+q.replace(/[<>"&]/g,'')+'</div>';
    }
    Object.keys(groups).forEach(function(g){
      html+='<div class="sr-group">'+g+'</div>';
      groups[g].forEach(function(h){
        html+='<a class="sr-i" href="'+h.href+'"><span class="sr-ico badge '+h.cls+'">'+h.ico+'</span><div><div class="sr-name">'+h.name+'</div><div class="sr-meta">'+h.meta+'</div></div></a>';
      });
    });
    res.innerHTML=html;
    res.classList.add('open');
  }
  box.addEventListener('input',function(){run(box.value);});
  box.addEventListener('focus',function(){if(box.value){run(box.value);}});
  document.addEventListener('click',function(e){
    if(!e.target.closest('.search-wrap')){res.classList.remove('open');}
  });
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();box.focus();}
    if(e.key==='/'&&document.activeElement!==box&&!/input|textarea/i.test(document.activeElement.tagName)){e.preventDefault();box.focus();}
    if(e.key==='Escape'){res.classList.remove('open');}
  });
}

var currentView='card';

/* ---- Category icons ---- */

  'Bitumen':'🛢️',

  'Steel':'🔩',
  'Cement':'🏚️',

/* ---- Tag badge class ---- */
/** Return a CSS badge class for a given tag string */
function tagClass(tag){
  if(tag==='Critical'){return 'b-red';}
  if(tag==='Fast Moving'){return 'b-green';}
  if(tag==='Seasonal'){return 'b-amber';}
  if(tag==='New'){return 'b-blue';}
  return 'b-grey';
}

/* ---- Stock level helpers ---- */
/** Calculate the stock ratio (stock / reorder) clamped to [0,2] */
function stockRatio(m){
  if(m.reorder===0){return 1;}
  return m.stock/m.reorder;
}
/** Return colour for a stock progress bar */
function stockColor(m){
  var r=stockRatio(m);
  if(r<1){return 'var(--red)';}
  if(r<1.5){return 'var(--amber)';}
  return 'var(--green)';
}
/** Return the stock level category string: 'critical', 'low', or 'ok' */
function stockLevel(m){
  var r=stockRatio(m);
  if(r<1){return 'critical';}
  if(r<1.5){return 'low';}
  return 'ok';
}
/** Return percentage width for the progress bar, capped at 100% */
function stockPct(m){
  var pct=Math.min(100,(m.stock/m.reorder)*100);
  return pct.toFixed(1);
}

/* ---- Fake price history generator ---- */
/** Build a plausible 6-entry price history array for the given material */
function buildHistory(m){
  var hist=[];
  var suppliers=[m.supplier,'MUSCAT SUPPLY LLC','AL NAHDA TRADING','GULF PROCUREMENT CO'];
  var base=m.price;
  var months=['2025-12','2026-01','2026-02','2026-03','2026-04','2026-05'];
  for(var i=0;i<6;i++){
    var variation=(Math.random()-0.5)*0.1;
    var p=base*(1+variation*(6-i)*0.04);
    var supplier=suppliers[i%suppliers.length];
    hist.push({date:months[i],price:parseFloat(p.toFixed(3)),supplier:supplier});
  }
  hist.push({date:'2026-06',price:m.price,supplier:m.supplier,current:true});
  return hist;
}

/* ---- Filter panel setup ---- */
/** Build checkbox lists for Category and Unit filters */
function buildFilterPanel(){
  var cats={};
  var units={};
  SEED.materials.forEach(function(m){
    if(!cats[m.cat]){cats[m.cat]=0;}
    cats[m.cat]++;
    if(!units[m.unit]){units[m.unit]=0;}
    units[m.unit]++;
  });
  var cEl=$('#catFilters');
  cEl.innerHTML='';
  Object.keys(cats).sort().forEach(function(c){
    var lbl=document.createElement('label');
    lbl.className='filter-check';
    var chk=document.createElement('input');
    chk.type='checkbox';
    chk.dataset.cat=c;
    chk.addEventListener('change',function(){
      filterState.cats[c]=chk.checked;
      applyFilters();
    });
    var span=document.createElement('span');
    span.textContent=c;
    var cnt=document.createElement('span');
    cnt.className='f-count';
    cnt.textContent=cats[c];
    lbl.appendChild(chk);lbl.appendChild(span);lbl.appendChild(cnt);
    cEl.appendChild(lbl);
    filterState.cats[c]=false;
  });
  var uEl=$('#unitFilters');
  uEl.innerHTML='';
  Object.keys(units).sort().forEach(function(u){

    lbl.className='filter-check';

    chk.type='checkbox';
    chk.dataset.unit=u;
    chk.addEventListener('change',function(){
      filterState.units[u]=chk.checked;
      applyFilters();
    });
    var span=document.createElement('span');
    span.textContent=u;
    var cnt=document.createElement('span');
    cnt.className='f-count';
    cnt.textContent=units[u];
    lbl.appendChild(chk);lbl.appendChild(span);lbl.appendChild(cnt);
    uEl.appendChild(lbl);
    filterState.units[u]=false;
  });
  var critical=SEED.materials.filter(function(m){return stockLevel(m)==='critical';}).length;
  var low=SEED.materials.filter(function(m){return stockLevel(m)==='low';}).length;
  var ok=SEED.materials.filter(function(m){return stockLevel(m)==='ok';}).length;
  $('#fCriticalCount').textContent=critical;

  $('#fOkCount').textContent=ok;
  $('#fCritical').addEventListener('change',function(){filterState.stock.critical=$('#fCritical').checked;applyFilters();});
  $('#fLow').addEventListener('change',function(){filterState.stock.low=$('#fLow').checked;applyFilters();});
  $('#fOk').addEventListener('change',function(){filterState.stock.ok=$('#fOk').checked;applyFilters();});
}

/* ---- Apply active filters to SEED.materials ---- */
/** Return filtered and sorted array of materials based on current filterState */
function getFilteredMaterials(){
  var anyCat=Object.values(filterState.cats).some(function(v){return v;});
  var anyUnit=Object.values(filterState.units).some(function(v){return v;});
  var anyStock=filterState.stock.critical||filterState.stock.low||filterState.stock.ok;
  var pMin=filterState.priceMin===''?null:parseFloat(filterState.priceMin);
  var pMax=filterState.priceMax===''?null:parseFloat(filterState.priceMax);
  var result=SEED.materials.filter(function(m){
    if(anyCat&&!filterState.cats[m.cat]){return false;}
    if(anyUnit&&!filterState.units[m.unit]){return false;}
    if(anyStock){
      var sl=stockLevel(m);
      var pass=false;
      if(filterState.stock.critical&&sl==='critical'){pass=true;}
      if(filterState.stock.low&&sl==='low'){pass=true;}
      if(filterState.stock.ok&&sl==='ok'){pass=true;}
      if(!pass){return false;}
    }
    if(pMin!==null&&m.price<pMin){return false;}
    if(pMax!==null&&m.price>pMax){return false;}
    return true;
  });
  result=result.slice().sort(function(a,b){
    var av=a[sortField];
    var bv=b[sortField];
    if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
    if(av<bv){return -sortDir;}
    if(av>bv){return sortDir;}
    return 0;
  });
  return result;
}

/* ---- Apply filters and re-render ---- */
/** Trigger filter re-apply and re-render both views */
function applyFilters(){
  filterState.priceMin=$('#priceMin').value;
  filterState.priceMax=$('#priceMax').value;
  renderCatalog();
}

/** Clear all filter checkboxes and reset filterState */
function clearFilters(){
  Object.keys(filterState.cats).forEach(function(k){filterState.cats[k]=false;});
  Object.keys(filterState.units).forEach(function(k){filterState.units[k]=false;});
  filterState.stock={critical:false,low:false,ok:false};
  filterState.priceMin='';
  filterState.priceMax='';
  document.querySelectorAll('#filterPanel input[type=checkbox]').forEach(function(c){c.checked=false;});
  $('#priceMin').value='';
  $('#priceMax').value='';
  renderCatalog();
}

/* ---- View toggle ---- */
/** Switch between 'card' and 'table' views */
function setView(v){
  currentView=v;
  $('#vCard').classList.toggle('on',v==='card');
  $('#vCard').setAttribute('aria-selected',v==='card'?'true':'false');
  $('#vTable').classList.toggle('on',v==='table');
  $('#vTable').setAttribute('aria-selected',v==='table'?'true':'false');
  $('#matGrid').style.display=v==='card'?'grid':'none';
  $('#matTableWrap').style.display=v==='table'?'block':'none';
  renderCatalog();
}

/* ---- Sort ---- */
/** Toggle sort field and direction then re-render */
function sortBy(field){
  if(sortField===field){
    sortDir*=-1;
  }else{
    sortField=field;
    sortDir=1;
  }
  renderCatalog();
}

/* ---- Render count label ---- */
/** Update the item count display in the toolbar */
function updateCount(n,total){
  var el=$('#matCount');
  if(n===total){
    el.textContent='Showing all '+total+' items';
  }else{
    el.textContent='Showing '+n+' of '+total+' items';
  }
}

/* ---- Render catalog ---- */
/** Render either the card grid or table depending on currentView */
function renderCatalog(){
  var items=getFilteredMaterials();
  updateCount(items.length,SEED.materials.length);
  var empty=$('#emptyState');
  if(items.length===0){
    empty.style.display='block';
    $('#matGrid').innerHTML='';
    $('#matTableBody').innerHTML='';
    return;
  }
  empty.style.display='none';
  if(currentView==='card'){
    renderCardView(items);
  }else{
    renderTableView(items);
  }
}

/** Delete a material (admin only) after confirmation, then refresh the catalog. */
function deleteMaterial(m){
  if(!window.Nexus||!Nexus.isAdmin()){toast('Only administrators can delete');return;}
  if(!confirm('Delete material "'+m.name+'"? This cannot be undone.'))return;
  Nexus.remove('materials',m.id).then(function(){
    toast('Material deleted: '+m.name);
    Nexus.load([{name:'materials',apply:function(a){SEED.materials=a;}}]).then(function(){buildFilterPanel();renderCatalog();});
  }).catch(function(e){toast(e.message||'Could not delete');});
}

/* ---- Inline price editing ---- */
/** Replace the price span with an input for inline editing */
function startPriceEdit(m,priceSpan,priceRow){
  var input=document.createElement('input');
  input.className='mat-price-input';
  input.type='number';
  input.step='any';
  input.value=m.price;
  input.setAttribute('aria-label','Edit price for '+m.name);
  priceRow.replaceChild(input,priceSpan);
  input.focus();
  input.select();
  function commit(){
    var newVal=parseFloat(input.value);
    if(!isNaN(newVal)&&newVal>0){
      m.price=parseFloat(newVal.toFixed(3));
      m.date=new Date().toISOString().slice(0,10);
      savePriceToFirestore(m);
      toast('Price updated: '+m.name+' → OMR '+fmtOMR(m.price)+'/'+m.unit);
    }
    priceRow.replaceChild(priceSpan,input);
    priceSpan.textContent=fmtOMR(m.price);
  }
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){commit();}
    if(e.key==='Escape'){priceRow.replaceChild(priceSpan,input);}
  });
  input.addEventListener('blur',commit);
}

/** Persist a material's updated price to Firestore */
function savePriceToFirestore(m){
  if(!db){return;}
  try{
    db.collection('nexus_materials').doc(m.id).set({
      id:m.id,name:m.name,cat:m.cat,unit:m.unit,
      price:m.price,date:m.date,stock:m.stock,
      reorder:m.reorder,supplier:m.supplier||'',tag:m.tag||'',
      updatedAt:Date.now(),by:SEED.user.name
    },{merge:true});
  }catch(e){
    console.warn('Firestore write failed',e);
  }
}

    actWrap.appendChild(btnH);
    if(window.Nexus&&Nexus.isAdmin()){
      var btnD=document.createElement('button');
      btnD.className='btn btn-no btn-sm';
      btnD.textContent='🗑️';
      btnD.setAttribute('aria-label','Delete material '+m.name);
      btnD.setAttribute('title','Delete material (admin)');
      btnD.addEventListener('click',function(){deleteMaterial(m);});
      actWrap.appendChild(btnD);
    }
    tdAct.appendChild(actWrap);
    tr.appendChild(tdAct);

    tbody.appendChild(tr);
  });
  /* sync select-all checkbox */
  var sa=$('#selectAll');
  if(sa){
    if(selectedIds.size===0){sa.checked=false;sa.indeterminate=false;}
    else if(selectedIds.size===items.length){sa.checked=true;sa.indeterminate=false;}
    else{sa.checked=false;sa.indeterminate=true;}
  }
}

/** Inline price edit for table view cells */
function startTablePriceEdit(m,priceCell,tdPrice){
  var input=document.createElement('input');
  input.className='mat-price-input';
  input.type='number';
  input.step='any';
  input.style.width='110px';
  input.value=m.price;
  input.setAttribute('aria-label','Edit price for '+m.name);
  tdPrice.replaceChild(input,priceCell);
  input.focus();
  input.select();
  function commit(){
    var newVal=parseFloat(input.value);
    if(!isNaN(newVal)&&newVal>0){
      m.price=parseFloat(newVal.toFixed(3));
      m.date=new Date().toISOString().slice(0,10);
      savePriceToFirestore(m);
      toast('Price updated: '+m.name+' → OMR '+fmtOMR(m.price)+'/'+m.unit);
    }
    priceCell.textContent=fmtOMR(m.price)+' OMR';
    tdPrice.replaceChild(priceCell,input);
  }
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){commit();}
    if(e.key==='Escape'){tdPrice.replaceChild(priceCell,input);}
  });
  input.addEventListener('blur',commit);
}

/* ---- Selection management ---- */
/** Toggle selection state for a single material by id */
function toggleSelect(id,checked){
  if(checked){
    selectedIds.add(id);
  }else{
    selectedIds.delete(id);
  }
  updateBulkBar();
}
/** Toggle all visible items as selected or deselected */
function toggleSelectAll(checked){
  var items=getFilteredMaterials();
  items.forEach(function(m){
    if(checked){selectedIds.add(m.id);}
    else{selectedIds.delete(m.id);}
  });
  renderCatalog();
  updateBulkBar();
}
/** Deselect all materials and re-render */
function clearSelection(){
  selectedIds.clear();
  var sa=$('#selectAll');
  if(sa){sa.checked=false;sa.indeterminate=false;}
  renderCatalog();
  updateBulkBar();
}
/** Show or hide the bulk action bar based on selection count */
function updateBulkBar(){
  var bar=$('#bulkBar');
  var count=$('#bulkCount');
  if(selectedIds.size>0){
    bar.classList.add('open');
    count.textContent=selectedIds.size+' item'+(selectedIds.size===1?'':' s')+' selected';
  }else{
    bar.classList.remove('open');
  }
}

/* ---- Bulk actions ---- */
/** Create a purchase request from selected materials */
function bulkCreatePR(){
  var n=selectedIds.size;
  if(n===0){toast('No materials selected');return;}
  var names=[];
  SEED.materials.forEach(function(m){
    if(selectedIds.has(m.id)){names.push(m.name.split(' ').slice(0,3).join(' '));}
  });
  var desc=names.slice(0,2).join(', ')+(names.length>2?' + '+(names.length-2)+' more':'');
  var totalEst=0;
  SEED.materials.forEach(function(m){
    if(selectedIds.has(m.id)){totalEst+=m.price*Math.max(m.reorder-m.stock,0);}
  });
  toast('📋 Purchase Request created for '+n+' material'+(n===1?'':'s')+' ('+desc+') — est. OMR '+fmtOMR(totalEst));
  clearSelection();
}
/** Request quotes for selected materials */
function bulkRequestQuote(){
  var n=selectedIds.size;
  if(n===0){toast('No materials selected');return;}
  toast('💬 Quote request sent to default suppliers for '+n+' material'+(n===1?'':'s'));
  clearSelection();
}

/* ---- Quick action helpers ---- */
/** Request a quote for a single material */
function requestQuote(m){
  toast('💬 Quote request sent to '+( m.supplier||'preferred supplier')+' for '+m.name);
}
/** Add a single material to a new purchase request */
function addToPR(m){
  var qty=Math.max(m.reorder-m.stock,1);
  var est=m.price*qty;
  toast('📋 '+m.name+' added to Purchase Request — '+qty+' '+m.unit+' · est. OMR '+fmtOMR(est));
}

/* ---- History modal ---- */
/** Open the price history modal for the given material */
function openHistory(m){
  activeHistMaterialId=m.id;
  $('#histModalTitle').textContent='Price History — '+m.id;
  $('#histMaterialName').textContent=m.name+' · '+m.unit;
  var hist=buildHistory(m);
  var list=$('#histList');
  list.innerHTML='';
  var prev=null;
  hist.forEach(function(h){
    var row=document.createElement('div');
    row.className='hist-row';
    var dateEl=document.createElement('div');
    dateEl.className='hist-date';
    dateEl.textContent=h.date+(h.current?' (Current)':'');
    var priceEl=document.createElement('div');
    priceEl.className='hist-price';
    priceEl.textContent='OMR '+fmtOMR(h.price)+' / '+m.unit;
    var supEl=document.createElement('div');
    supEl.className='hist-supplier';
    supEl.textContent=h.supplier;
    var deltaEl=document.createElement('div');
    if(prev!==null){
      var pct=((h.price-prev)/prev*100);
      deltaEl.className='hist-delta '+(pct>0?'up':(pct<0?'dn':'flat'));
      deltaEl.textContent=(pct>0?'+':'')+pct.toFixed(1)+'%';
    }else{
      deltaEl.className='hist-delta flat';
      deltaEl.textContent='base';
    }
    prev=h.price;
    row.appendChild(dateEl);
    row.appendChild(priceEl);
    row.appendChild(deltaEl);
    row.appendChild(supEl);
    list.appendChild(row);
  });
  openModal('historyModal');
}
/** Request a quote from within the history modal */
function requestQuoteFromHistory(){
  if(!activeHistMaterialId){return;}
  var m=SEED.materials.find(function(x){return x.id===activeHistMaterialId;});
  if(m){requestQuote(m);}
  closeModal('historyModal');
}

/* ---- Add material modal ---- */
/** Open the add material modal */
function openAddModal(){
  openModal('addModal');
}
/** Submit the add material form */
function submitAddMaterial(){
  var name=$('#addName').value.trim();
  if(!name){toast('Please enter a material name');return;}
  var price=parseFloat($('#addPrice').value)||0;
  var stock=parseInt($('#addStock').value)||0;
  var reorder=parseInt($('#addReorder').value)||0;
  var newId='M-'+String(1000+SEED.materials.length+1);
  var mat={
    id:newId,
    name:name,
    cat:$('#addCat').value,
    unit:$('#addUnit').value,
    price:price,
    date:new Date().toISOString().slice(0,10),
    stock:stock,
    reorder:reorder,
    supplier:$('#addSupplier').value.trim()||'',
    tag:$('#addTag').value||''
  };
  SEED.materials.unshift(mat);
  savePriceToFirestore(mat);
  closeModal('addModal');
  $('#addName').value='';
  $('#addPrice').value='';
  $('#addStock').value='';
  $('#addReorder').value='';
  $('#addSupplier').value='';
  renderCatalog();
  toast('✅ '+mat.id+' — '+mat.name+' added to catalog');
}

/* ---- Filter panel mobile toggle ---- */
/** Toggle the filter panel visibility on mobile */
function toggleFilterPanel(){
  var panel=$('#filterPanel');
  var btn=$('#filterToggleBtn');
  var isOpen=panel.classList.contains('mobile-open');
  panel.classList.toggle('mobile-open',!isOpen);
  btn.setAttribute('aria-expanded',!isOpen?'true':'false');
}

/* ---- CSV Export ---- */
/** Export the current filtered materials as a downloadable CSV file */
function exportCSV(){
  var items=getFilteredMaterials();
  var rows=['ID,Name,Category,Unit,Last Price (OMR),Date,Stock,Reorder,Supplier,Tag'];
  items.forEach(function(m){
    rows.push([m.id,'"'+m.name+'"',m.cat,m.unit,m.price,m.date,m.stock,m.reorder,'"'+(m.supplier||'')+'"',m.tag||''].join(','));
  });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='nexus-materials-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('⬇ Exported '+items.length+' materials as CSV');
}

/* ---- Modal helpers ---- */
/** Open a modal overlay by id */
function openModal(id){
  var el=$('#'+id);
  if(el){el.classList.add('open');}
}
/** Close a modal overlay by id */
function closeModal(id){
  var el=$('#'+id);
  if(el){el.classList.remove('open');}
}

/* ---- Keyboard and click-outside modal dismissal ---- */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(function(o){o.classList.remove('open');});
  }
});
document.addEventListener('click',function(e){
  document.querySelectorAll('.overlay.open').forEach(function(o){
    if(e.target===o){o.classList.remove('open');}
  });
});

/* ---- Boot ---- */
/** Main boot sequence: theme, shell, filters, catalog, search, live */
function boot(){
  if(!window.Nexus||!Nexus.requireAuth())return;
  if(!Nexus.guardSection('materials'))return;
  Nexus.applyIdentity();
  initTheme();
  renderShell();
  buildFilterPanel();
  renderCatalog();
  initSearch();
  initLive();
  Nexus.applyChrome('materials');
  Nexus.load([{name:'materials',apply:function(a){SEED.materials=a;}}]).then(function(){buildFilterPanel();renderCatalog();renderShell();Nexus.applyChrome('materials');});
}
document.addEventListener('DOMContentLoaded',boot);

/* ---- PWA ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('nexus-sw.js').catch(function(){});
  });
}
</script>
