<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ERP Nexus — Offers</title>
<meta name="theme-color" content="#E8612C">
<meta name="description" content="ERP Nexus — Offer Comparison Engine">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nexus">
<link rel="manifest" href="nexus-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="nexus-core.js"></script>
<style>
/* ============================================================
   ERP NEXUS — SHARED DESIGN SYSTEM (canonical, replicated per module)
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#E8612C;--primary-d:#C44D1E;--primary-l:rgba(232,97,44,.09);
  --blue:#2D7DD2;--blue-l:rgba(45,125,210,.1);
  --green:#1DB06A;--amber:#E8930A;--red:#E5484D;--purple:#7C3AED;
  --bg:#F4F5F9;--surface:#FFFFFF;--surface-2:#FAFBFE;
  --text:#0F1117;--muted:#7B8299;--border:#E7EAF2;
  --sh-sm:0 1px 3px rgba(15,17,23,.06);
  --sh:0 1px 3px rgba(15,17,23,.06),0 6px 18px rgba(15,17,23,.05);
  --sh-lg:0 20px 40px rgba(15,17,23,.16);
  --r:12px;--r-sm:8px;--r-lg:16px;
  --glass:rgba(255,255,255,.72);
}
[data-theme="dark"]{
  --bg:#0E1016;--surface:#171A22;--surface-2:#1E222C;
  --text:#EEF1F7;--muted:#8A92A6;--border:#272C38;
  --primary-l:rgba(232,97,44,.16);--blue-l:rgba(45,125,210,.18);
  --glass:rgba(23,26,34,.72);
  --sh-sm:0 1px 3px rgba(0,0,0,.4);--sh:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ---- App shell ---- */
.shell{display:flex;height:100vh;height:100dvh;}
.sb{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;height:100dvh;transition:width .2s;}
.sb-head{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);}
.sb-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),#F4863F);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;flex-shrink:0;box-shadow:0 4px 12px rgba(232,97,44,.35);}
.sb-brand{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.sb-brand span{color:var(--primary);}
.sb-ver{font-size:10px;color:var(--muted);font-weight:600;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-sec{padding:14px 16px 6px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:2px 9px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:background .15s,color .15s;}
.nav-i:hover{background:var(--surface-2);color:var(--text);}
.nav-i.active{background:var(--primary-l);color:var(--primary);font-weight:700;}
.nav-ico{font-size:17px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:9px;}
.sb-foot{padding:12px;border-top:1px solid var(--border);}
.u-card{display:flex;align-items:center;gap:10px;}
.u-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#5AA0E6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;}
.u-name{font-size:12.5px;font-weight:700;}
.u-role{font-size:10.5px;color:var(--muted);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .15s;}
.icon-btn:hover{color:var(--primary);border-color:var(--primary);}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:30;}
.tb-title h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.tb-title p{font-size:11.5px;color:var(--muted);}
.search-wrap{flex:1;max-width:480px;position:relative;}
.search-box{width:100%;height:40px;padding:0 14px 0 40px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface-2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);background:var(--surface);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none;}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 6px;background:var(--surface);}
.tb-actions{display:flex;align-items:center;gap:9px;margin-left:auto;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(29,176,106,.1);border:1px solid rgba(29,176,106,.25);color:var(--green);padding:6px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.live-pill.offline{background:rgba(232,147,10,.1);border-color:rgba(232,147,10,.3);color:var(--amber);}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(1.6);}}

.content{flex:1;overflow-y:auto;padding:20px 22px 90px;}
.page-grid{max-width:1440px;margin:0 auto;}

/* ---- KPI cards ---- */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:18px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.kpi-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:11px;}
.kpi-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;}
.kpi-val{font-size:25px;font-weight:800;letter-spacing:-.5px;line-height:1;}
.kpi-sub{font-size:10.5px;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:3px;}
.kpi.alert{border-color:rgba(229,72,77,.35);}
.kpi.alert .kpi-val{color:var(--red);animation:pulseRed 1.8s infinite;}
@keyframes pulseRed{0%,100%{opacity:1;}50%{opacity:.55;}}
.up{color:var(--green);}.dn{color:var(--red);}

/* ---- Cards / layout ---- */
.grid-2{display:grid;grid-template-columns:1.15fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-t{font-size:13.5px;font-weight:800;letter-spacing:-.2px;}
.card-t small{font-weight:600;color:var(--muted);font-size:11px;margin-left:6px;}
.link-btn{font-size:11.5px;font-weight:700;color:var(--primary);background:none;border:none;}

/* ---- Action center ---- */
.action-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:11px;margin-bottom:9px;transition:border-color .15s;}
.action-item:hover{border-color:var(--primary);}
.ai-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-body{flex:1;min-width:0;}
.ai-title{font-size:13px;font-weight:700;}
.ai-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.ai-actions{display:flex;gap:6px;flex-shrink:0;}
.btn{border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;padding:8px 14px;transition:filter .15s,background .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-pri{background:var(--primary);color:#fff;}.btn-pri:hover{background:var(--primary-d);}
.btn-ok{background:var(--green);color:#fff;}.btn-ok:hover{filter:brightness(.93);}
.btn-no{background:rgba(229,72,77,.12);color:var(--red);}.btn-no:hover{background:rgba(229,72,77,.2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:6px 11px;font-size:11px;}

/* ---- Activity feed ---- */
.feed{display:flex;flex-direction:column;}
.feed-i{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.feed-i:last-child{border-bottom:none;}
.feed-dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.feed-txt{font-size:12.5px;line-height:1.5;}
.feed-txt b{font-weight:700;}
.feed-time{font-size:10.5px;color:var(--muted);margin-top:2px;}

/* ---- badges & chips ---- */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;}
.b-green{background:rgba(29,176,106,.12);color:#0e7a4a;}
.b-amber{background:rgba(232,147,10,.13);color:#a06003;}
.b-red{background:rgba(229,72,77,.12);color:#c0292e;}
.b-blue{background:var(--blue-l);color:#1a5fa0;}
.b-grey{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.b-purple{background:rgba(124,58,237,.12);color:#6d28d9;}
.chart-box{position:relative;height:230px;}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ---- Mobile bottom nav ---- */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50;justify-content:space-around;}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:9.5px;font-weight:700;}
.bn-i.active{color:var(--primary);}
.bn-i .nav-ico{font-size:19px;}

/* ---- Search overlay results ---- */
.search-results{position:absolute;top:46px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh-lg);padding:8px;max-height:60vh;overflow-y:auto;display:none;z-index:40;}
.search-results.open{display:block;}
.sr-group{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 4px;}
.sr-i{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;}
.sr-i:hover{background:var(--surface-2);}
.sr-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sr-name{font-size:12.5px;font-weight:600;}.sr-meta{font-size:10.5px;color:var(--muted);}
.sr-ai{font-size:11.5px;color:var(--primary);font-weight:700;padding:8px 10px;}

.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;padding:12px 14px;box-shadow:var(--sh-lg);font-size:12.5px;font-weight:600;min-width:240px;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateX(120%);}to{transform:translateX(0);}}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr);}.grid-2,.grid-3{grid-template-columns:1fr;}}
@media(max-width:760px){
  .sb{display:none;}
  .bottom-nav{display:flex;}
  .topbar{padding:10px 14px;}
  .tb-title{display:none;}
  .search-kbd{display:none;}
  .content{padding:14px 14px 90px;}
  .kpis{grid-template-columns:repeat(2,1fr);gap:10px;}
  .live-pill span{display:none;}
}

/* ---- OFFERS MODULE CSS ---- */
/* segmented filter bar */
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;}
.seg button{border:none;background:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;color:var(--muted);}
.seg button.on{background:var(--primary);color:#fff;}

/* modal / overlay */
.overlay{position:fixed;inset:0;background:rgba(8,10,16,.45);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:120;padding:18px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:pop .2s cubic-bezier(.16,1,.3,1);}
.modal-wide{max-width:820px;}
@keyframes pop{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-t{font-size:15px;font-weight:800;}
.modal-b{padding:18px;}
.modal-f{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.fld input,.fld select,.fld textarea{width:100%;min-height:40px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.fld textarea{min-height:84px;resize:vertical;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}

/* offers toolbar */
.offers-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}

/* offer cards grid */
.offers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

/* individual offer card */
.offer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:0;}
.offer-card:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.offer-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-l),var(--sh);}

.oc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.oc-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px;}
.oc-info{flex:1;min-width:0;}
.oc-supplier{font-size:13px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-item{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;}

.oc-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.oc-price{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.oc-price-label{font-size:11px;color:var(--muted);font-weight:600;}
.oc-unit{font-size:11.5px;color:var(--muted);font-weight:600;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;margin-bottom:8px;display:inline-block;}

.oc-insight{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:10px;}
.insight-above{color:var(--red);}
.insight-below{color:var(--green);}
.insight-neutral{color:var(--muted);}

.oc-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.validity-badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;}
.vb-green{background:rgba(29,176,106,.12);color:#0e7a4a;}
.vb-amber{background:rgba(232,147,10,.13);color:#a06003;}
.vb-red{background:rgba(229,72,77,.12);color:#c0292e;}
.vb-expired{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}

.oc-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}

/* compare checkbox */
.compare-check-wrap{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;}
.compare-check-wrap input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;}

/* negotiation history section */
.neg-section{border-top:1px solid var(--border);padding-top:10px;margin-top:4px;}
.neg-toggle{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);background:none;border:none;padding:0;cursor:pointer;width:100%;}
.neg-toggle:hover{color:var(--primary);}
.neg-history{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.neg-entry{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.neg-entry-amount{font-size:12.5px;font-weight:700;}
.neg-entry-note{font-size:11px;color:var(--muted);margin-top:2px;}
.neg-entry-time{font-size:10px;color:var(--muted);margin-top:2px;}

/* floating compare button */
.compare-fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;border:none;border-radius:999px;padding:12px 28px;font-size:13px;font-weight:800;box-shadow:0 6px 24px rgba(232,97,44,.45);display:none;align-items:center;gap:8px;z-index:60;transition:background .15s,box-shadow .15s;}
.compare-fab:hover{background:var(--primary-d);}
.compare-fab.show{display:flex;}

/* comparison table */
.cmp-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.cmp-table th{text-align:left;padding:9px 12px;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);background:var(--surface-2);}
.cmp-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4;}
.cmp-table tr:last-child td{border-bottom:none;}
.cmp-table .row-label{font-weight:700;color:var(--muted);white-space:nowrap;}
.cmp-table td.cheapest{background:rgba(29,176,106,.09);color:#0e7a4a;font-weight:800;border-radius:4px;}

/* empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .es-ico{font-size:48px;margin-bottom:12px;}
.empty-state .es-msg{font-size:14px;font-weight:600;}

@media(max-width:760px){
  .offers-grid{grid-template-columns:1fr;}
  .compare-fab{bottom:80px;}
}
</style>
</head>
<body>
<div class="shell">
  <!-- ================= SIDEBAR ================= -->
  <aside class="sb" id="sidebar" aria-label="Site navigation"></aside>

  <main class="main">
    <header class="topbar">
      <div class="tb-title">
        <h1>Offers</h1>
        <p>Offer comparison engine</p>
      </div>
      <div class="search-wrap">
        <span class="search-ico" aria-hidden="true">🔍</span>
        <input class="search-box" id="globalSearch" placeholder="Search materials, suppliers, offers, requests…" aria-label="Global search" autocomplete="off">
        <span class="search-kbd">Ctrl K</span>
        <div class="search-results" id="searchResults" role="listbox" aria-label="Search results"></div>
      </div>
      <div class="tb-actions">
        <div class="live-pill" id="livePill"><span class="live-dot"></span><span>Live</span></div>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Toggle theme">🌙</button>
      </div>
    </header>

    <div class="content">
      <div class="page-grid">

        <!-- KPI strip -->
        <section class="kpis" id="kpiRow" aria-label="Offer key metrics"></section>

/* ---- helpers ---- */
/**
 * Shorthand querySelector.
 * @param {string} s - CSS selector.
 * @param {Element} [r] - Root element (defaults to document).
 * @returns {Element|null}
 */
function $(s,r){return (r||document).querySelector(s);}

/**
 * Creates a DOM element with optional class and text.
 * @param {string} tag - HTML tag name.
 * @param {string} [cls] - CSS class string.
 * @param {string|number} [txt] - Text content.
 * @returns {HTMLElement}
 */
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}

/**
 * Formats a number as OMR currency string.
 * @param {number} n - Numeric value.
 * @returns {string}
 */
function fmtOMR(n){return Number(n).toLocaleString('en-OM',{minimumFractionDigits:0,maximumFractionDigits:3});}

/**
 * Returns the number of days from 2026-06-03 to the given date string.
 * Negative means past.
 * @param {string} d - ISO date string.
 * @returns {number}
 */
function daysUntil(d){return Math.ceil((new Date(d)-new Date('2026-06-03'))/864e5);}

/**
 * Shows a transient toast notification.
 * @param {string} msg - Message text.
 */
function toast(msg){
  var w=$('#toastWrap');
  var t=el('div','toast',msg);
  w.appendChild(t);
  setTimeout(function(){
    t.style.opacity='0';
    t.style.transition='opacity .3s';
    setTimeout(function(){t.remove();},300);
  },3500);
}

/**
 * Returns count of Purchase Requests still pending approval.
 * @returns {number}
 */

/**

 * @param {string} t - 'dark' or 'light'.
 */

  var b=$('#themeBtn');
  if(b)b.textContent=t==='dark'?'☀️':'🌙';

}

/**

 */
function initTheme(){
  var saved=localStorage.getItem('nexus-theme');
  if(!saved){saved=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
  applyTheme(saved);
  var b=$('#themeBtn');
  if(b){
    b.onclick=function(){
      applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
    };

}

/**
 * Builds a flat search index from all SEED collections.
 * @returns {Array<Object>}
 */
function buildSearchIndex(){
  var ix=[];
  SEED.materials.forEach(function(m){ix.push({grp:'Materials',ico:'📦',cls:'b-blue',name:m.name,meta:m.cat+' · '+fmtOMR(m.price)+' OMR/'+m.unit,href:'materials.html'});});

  return ix;
}

/**
 * Initialises the global topbar search box with live filtering.
 */
function initSearch(){
  var box=$('#globalSearch'),res=$('#searchResults'),ix=buildSearchIndex();
  function run(q){
    q=q.trim().toLowerCase();
    if(!q){res.classList.remove('open');return;}
    var hits=ix.filter(function(i){return (i.name+' '+i.meta).toLowerCase().indexOf(q)>-1;}).slice(0,12);
    var groups={};
    hits.forEach(function(h){(groups[h.grp]=groups[h.grp]||[]).push(h);});
    var html='';
    if(q.indexOf('crane')>-1||q.indexOf('150')>-1)html+='<div class="sr-ai">💡 Did you mean: Crawler Crane 150T?</div>';
    if(!hits.length){html+='<div class="sr-ai">No matches for "'+q+'"</div>';}
    Object.keys(groups).forEach(function(g){
      html+='<div class="sr-group">'+g+'</div>';
      groups[g].forEach(function(h){
        html+='<a class="sr-i" href="'+h.href+'"><span class="sr-ico badge '+h.cls+'">'+h.ico+'</span><div><div class="sr-name">'+h.name+'</div><div class="sr-meta">'+h.meta+'</div></div></a>';
      });
    });
    res.innerHTML=html;res.classList.add('open');
  }
  box.addEventListener('input',function(){run(box.value);});
  box.addEventListener('focus',function(){if(box.value)run(box.value);});
  document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))res.classList.remove('open');});
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();box.focus();}
    if(e.key==='/'&&document.activeElement!==box&&!/input|textarea/i.test(document.activeElement.tagName)){e.preventDefault();box.focus();}
    if(e.key==='Escape')res.classList.remove('open');
  });
}

}

/** @type {Set<string>} IDs of offers currently selected for comparison. */
var compareSet=new Set();

/** @type {string} Active filter key: 'all'|'active'|'expiring'|'expired'. */
var activeFilter='all';

/** @type {string|null} ID of the offer currently targeted for a counter-offer. */
var counterTargetId=null;

/** Palette for supplier avatar backgrounds (cycles by index). */
var AVATAR_COLORS=['#E8612C','#2D7DD2','#1DB06A','#7C3AED','#E8930A','#E5484D','#0891B2','#9333EA'];

/**
 * Returns two-letter initials from a supplier name.
 * @param {string} name - Supplier display name.
 * @returns {string}
 */
function supplierInitials(name){
  var parts=name.trim().split(/\s+/);
  if(parts.length>=2){return (parts[0][0]+parts[1][0]).toUpperCase();}
  return name.slice(0,2).toUpperCase();
}

/**
 * Returns the avatar background colour for a supplier by cycling through the palette.
 * @param {string} supplier - Supplier name.
 * @returns {string} CSS colour value.
 */
function avatarColor(supplier){
  var idx=SEED.offers.findIndex(function(o){return o.supplier===supplier;});
  return AVATAR_COLORS[idx%AVATAR_COLORS.length];
}

/**
 * Builds the validity badge HTML string for a given offer.
 * @param {Object} offer - Offer object from SEED.
 * @returns {string} HTML snippet.
 */
function validityBadgeHTML(offer){
  if(offer.status==='Expired'||offer.status==='Rejected'){
    return '<span class="validity-badge vb-expired">Expired</span>';
  }
  var days=daysUntil(offer.valid);
  if(days<0){
    return '<span class="validity-badge vb-expired">Expired</span>';
  }
  if(days<2){
    return '<span class="validity-badge vb-red">Expires in '+days+' day'+(days===1?'':'s')+'</span>';
  }
  if(days<=5){
    return '<span class="validity-badge vb-amber">Expires in '+days+' days</span>';
  }
  return '<span class="validity-badge vb-green">Expires in '+days+' days</span>';
}

/**
 * Returns the CSS class and icon for the AI price insight string.
 * Parses the leading + or - sign without nested ternaries.
 * @param {string} insight - Insight text, e.g. "+12% higher than market average".
 * @returns {{cls:string, ico:string}}
 */
function insightStyle(insight){
  var first=insight.trim().charAt(0);
  if(first==='+'){return {cls:'insight-above',ico:'⬆️'};}
  if(first==='-'){return {cls:'insight-below',ico:'⬇️'};}
  return {cls:'insight-neutral',ico:'➡️'};
}

/**
 * Returns the status badge HTML string for a given offer status.
 * @param {string} status - Offer status string.
 * @returns {string} HTML snippet.
 */
function statusChipHTML(status){
  if(status==='Active'){return '<span class="badge b-green">Active</span>';}
  if(status==='Accepted'){return '<span class="badge b-blue">Accepted</span>';}
  if(status==='Rejected'){return '<span class="badge b-red">Rejected</span>';}
  return '<span class="badge b-grey">Expired</span>';
}

/**
 * Filters offers according to the current activeFilter value.
 * @returns {Array<Object>} Filtered array of offer objects.
 */
function filteredOffers(){
  return SEED.offers.filter(function(o){
    if(activeFilter==='active'){return o.status==='Active';}
    if(activeFilter==='expiring'){
      if(o.status!=='Active'){return false;}
      var d=daysUntil(o.valid);
      return d>=0&&d<=5;
    }
    if(activeFilter==='expired'){return o.status==='Expired'||o.status==='Rejected'||daysUntil(o.valid)<0;}
    return true;
  });
}

/**
 * Updates the compare FAB visibility and label based on current compareSet size.
 */
function updateCompareFab(){
  var fab=$('#compareFab');
  var count=$('#fabCount');
  var n=compareSet.size;
  count.textContent='('+n+')';
  if(n>=2&&n<=3){
    fab.classList.add('show');
  }else{
    fab.classList.remove('show');
  }
}

/**
 * Toggles an offer in/out of the comparison set and re-renders the FAB.
 * @param {string} offerId - Offer ID to toggle.
 * @param {boolean} checked - Whether the checkbox is now checked.
 */
function toggleCompare(offerId,checked){
  if(checked){
    if(compareSet.size>=3){
      toast('Maximum 3 offers can be compared at once');
      var cb=document.querySelector('input[data-compare="'+offerId+'"]');
      if(cb)cb.checked=false;
      return;
    }
    compareSet.add(offerId);
  }else{
    compareSet.delete(offerId);
  }
  var card=document.querySelector('.offer-card[data-id="'+offerId+'"]');
  if(card){
    if(compareSet.has(offerId)){
      card.classList.add('selected');
    }else{
      card.classList.remove('selected');
    }
  }
  updateCompareFab();
}

/**
 * Renders the negotiation history list inside an offer card's expandable section.
 * @param {string} offerId - Offer ID.
 */
function renderNegHistory(offerId){
  var offer=SEED.offers.find(function(o){return o.id===offerId;});
  if(!offer)return;
  var container=document.getElementById('neg-hist-'+offerId);
  if(!container)return;
  if(!offer.notes||!offer.notes.length){
    container.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0;">No counter-offers logged yet.</div>';
    return;
  }
  var html='';
  offer.notes.forEach(function(n){
    html+='<div class="neg-entry">';
    html+='<div class="neg-entry-amount">Counter: '+fmtOMR(n.amount)+' OMR</div>';
    if(n.note){html+='<div class="neg-entry-note">'+n.note+'</div>';}
    html+='<div class="neg-entry-time">'+n.time+'</div>';
    html+='</div>';
  });
  container.innerHTML=html;
}

/**
 * Toggles the visibility of the negotiation history panel inside a card.
 * @param {string} offerId - Offer ID.
 */
function toggleNegHistory(offerId){
  var container=document.getElementById('neg-hist-'+offerId);
  var btn=document.getElementById('neg-toggle-btn-'+offerId);
  if(!container)return;
  var isHidden=container.style.display==='none'||container.style.display==='';
  if(isHidden){
    container.style.display='flex';
    if(btn)btn.textContent='▲ Counter-offer history';
    renderNegHistory(offerId);
  }else{
    container.style.display='none';
    if(btn)btn.textContent='▼ Counter-offer history';
  }
}

/**
 * Renders the full offer cards grid based on the current filter.
 */
function renderOffersGrid(){
  var grid=$('#offersGrid');
  var empty=$('#emptyState');
  var count=$('#offerCount');
  var offers=filteredOffers();

  count.textContent=offers.length+' offer'+(offers.length===1?'':'s');

  if(!offers.length){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  var html='';
  offers.forEach(function(o){
    var isSelected=compareSet.has(o.id);
    var bg=avatarColor(o.supplier);
    var initials=supplierInitials(o.supplier);
    var vBadge=validityBadgeHTML(o);
    var statusChip=statusChipHTML(o.status);
    var style=insightStyle(o.insight);
    var negCount=o.notes?o.notes.length:0;

    html+='<article class="offer-card'+(isSelected?' selected':'')+'" data-id="'+o.id+'" aria-label="Offer '+o.id+'">';

    /* top row: avatar + info + status */
    html+='<div class="oc-top">';
    html+='<div class="oc-avatar" style="background:'+bg+'" aria-hidden="true">'+initials+'</div>';
    html+='<div class="oc-info">';
    html+='<div class="oc-supplier">'+o.supplier+'</div>';
    html+='<div class="oc-item">'+o.item+'</div>';
    html+='</div>';
    html+=statusChip;
    html+='</div>';

    /* price */
    html+='<div class="oc-price-row">';
    html+='<span class="oc-price">'+fmtOMR(o.price)+'</span>';
    html+='<span class="oc-price-label">OMR total</span>';
    html+='</div>';
    html+='<span class="oc-unit">'+fmtOMR(o.unit)+' '+o.unitLabel+'</span>';

    /* AI insight */
    html+='<div class="oc-insight '+style.cls+'">';
    html+='<span>'+style.ico+'</span>';
    html+='<span>AI Insight: '+o.insight+'</span>';
    html+='</div>';

    /* footer: validity + compare checkbox */
    html+='<div class="oc-footer">';
    html+=vBadge;
    html+='<label class="compare-check-wrap" aria-label="Select for comparison">';
    html+='<input type="checkbox" data-compare="'+o.id+'"'+(isSelected?' checked':'')+' onchange="toggleCompare(\''+o.id+'\',this.checked)">';
    html+='Compare';
    html+='</label>';
    html+='</div>';

    /* action buttons */
    html+='<div class="oc-actions">';
    if(o.status!=='Rejected'&&o.status!=='Expired'&&daysUntil(o.valid)>=0){
      html+='<button class="btn btn-ok btn-sm" onclick="convertToPR(\''+o.id+'\')" aria-label="Convert '+o.id+' to Purchase Request">📋 Convert to PR</button>';
    }
    html+='<button class="btn btn-ghost btn-sm" onclick="openCounterModal(\''+o.id+'\')" aria-label="Log counter-offer for '+o.id+'">🤝 Counter-offer</button>';
    html+='</div>';

    /* negotiation history section */
    html+='<div class="neg-section">';
    html+='<button class="neg-toggle" id="neg-toggle-btn-'+o.id+'" onclick="toggleNegHistory(\''+o.id+'\')" aria-expanded="false">';
    html+='▼ Counter-offer history';
    if(negCount>0){html+=' <span class="badge b-blue" style="font-size:9.5px;padding:2px 7px;">'+negCount+'</span>';}
    html+='</button>';
    html+='<div class="neg-history" id="neg-hist-'+o.id+'" style="display:none" aria-live="polite"></div>';
    html+='</div>';

    html+='</article>';
  });

  grid.innerHTML=html;
}

/**
 * Sets the active filter tab and re-renders the grid.
 * @param {string} key - Filter key: 'all'|'active'|'expiring'|'expired'.
 */
function setFilter(key){
  activeFilter=key;
  var ids={all:'fAll',active:'fAct',expiring:'fExp',expired:'fOld'};
  Object.keys(ids).forEach(function(k){
    var btn=$('#'+ids[k]);
    if(btn){
      btn.classList.toggle('on',k===key);
      btn.setAttribute('aria-selected',k===key?'true':'false');
    }
  });
  renderOffersGrid();
}

/**
 * Renders the KPI strip above the filter bar.
 */
function renderKPIs(){
  var all=SEED.offers;
  var active=all.filter(function(o){return o.status==='Active';}).length;
  var expiring=all.filter(function(o){
    if(o.status!=='Active')return false;
    var d=daysUntil(o.valid);
    return d>=0&&d<=5;
  }).length;
  var expired=all.filter(function(o){return o.status==='Expired'||o.status==='Rejected'||daysUntil(o.valid)<0;}).length;
  var accepted=all.filter(function(o){return o.status==='Accepted';}).length;
  var totalValue=all.filter(function(o){return o.status==='Active';}).reduce(function(s,o){return s+o.price;},0);

  var kpis=[
    {ico:'🏷️',bg:'var(--blue-l)',c:'var(--blue)',lbl:'Active Offers',val:active,sub:'<span style="color:var(--muted)">out of '+all.length+' total</span>'},
    {ico:'⏱️',bg:'rgba(232,147,10,.13)',c:'var(--amber)',lbl:'Expiring Soon',val:expiring,sub:'<span class="dn">within 5 days</span>',alert:expiring>0},
    {ico:'✅',bg:'rgba(29,176,106,.12)',c:'var(--green)',lbl:'Accepted',val:accepted,sub:'<span class="up">converted to PR</span>'},
    {ico:'❌',bg:'rgba(229,72,77,.12)',c:'var(--red)',lbl:'Expired / Rejected',val:expired,sub:'<span style="color:var(--muted)">archive</span>'},
    {ico:'💰',bg:'rgba(124,58,237,.12)',c:'var(--purple)',lbl:'Active Value (OMR)',val:fmtOMR(totalValue),sub:'<span style="color:var(--muted)">live offers</span>'}
  ];

  $('#kpiRow').innerHTML=kpis.map(function(k){
    return '<div class="kpi'+(k.alert?' alert':'')+'">'
      +'<div class="kpi-ico" style="background:'+k.bg+';color:'+k.c+'">'+k.ico+'</div>'
      +'<div class="kpi-lbl">'+k.lbl+'</div>'
      +'<div class="kpi-val">'+k.val+'</div>'
      +'<div class="kpi-sub">'+k.sub+'</div>'
      +'</div>';
  }).join('');
}

/* ---- Compare modal ---- */
/**
 * Opens the side-by-side comparison modal for currently selected offers.
 */
function openCompareModal(){
  var ids=Array.from(compareSet);
  var offers=ids.map(function(id){return SEED.offers.find(function(o){return o.id===id;});}).filter(Boolean);
  if(offers.length<2){toast('Select at least 2 offers to compare');return;}

  /* find cheapest unit price index */
  var units=offers.map(function(o){return o.unit;});
  var minUnit=Math.min.apply(null,units);
  var cheapestIdx=units.indexOf(minUnit);

  var rows=[
    {label:'Supplier',vals:offers.map(function(o){return o.supplier;})},
    {label:'Item / Service',vals:offers.map(function(o){return o.item;})},
    {label:'Total (OMR)',vals:offers.map(function(o){return fmtOMR(o.price)+' OMR';})},
    {label:'Price / Unit',vals:offers.map(function(o){return fmtOMR(o.unit)+' '+o.unitLabel;}),cheapestCol:cheapestIdx},
    {label:'Validity',vals:offers.map(function(o){return o.valid+(daysUntil(o.valid)>=0?' ('+daysUntil(o.valid)+'d)':' (Expired)');})},
    {label:'AI Insight',vals:offers.map(function(o){return o.insight;})}
  ];

  var tableHTML='<table class="cmp-table"><thead><tr><th>Field</th>';
  offers.forEach(function(o){tableHTML+='<th>'+o.id+'</th>';});
  tableHTML+='</tr></thead><tbody>';

  rows.forEach(function(row){
    tableHTML+='<tr><td class="row-label">'+row.label+'</td>';
    row.vals.forEach(function(v,i){
      var isCheapest=row.cheapestCol!==undefined&&i===row.cheapestCol;
      tableHTML+='<td'+(isCheapest?' class="cheapest"':'')+'>'+v+'</td>';
    });
    tableHTML+='</tr>';
  });
  tableHTML+='</tbody></table>';
  tableHTML+='<p style="font-size:11px;color:var(--muted);margin-top:12px;">Green cell indicates the lowest price-per-unit offer.</p>';

  $('#cmpTableWrap').innerHTML=tableHTML;
  openModal('compareModal');
}

/* ---- Convert to Purchase Request ---- */
/**
 * Writes a new Purchase Request document to Firestore and shows a confirmation toast.
 * @param {string} offerId - Offer ID to convert.
 */
function convertToPR(offerId){
  var offer=SEED.offers.find(function(o){return o.id===offerId;});
  if(!offer)return;
  var newId='PR-'+(1192+SEED.prs.length);
  var pr={
    id:newId,
    desc:offer.item+' (from '+offerId+')',
    amount:offer.price,
    requester:SEED.user.name,
    supplier:offer.supplier,
    stage:'Submitted',
    age:0,
    created:'2026-06-03',
    sourceOffer:offerId
  };
  SEED.prs.unshift(pr);
  if(db){
    try{
      db.collection('nexus_prs').add({
        id:pr.id,
        desc:pr.desc,
        amount:pr.amount,
        requester:pr.requester,
        supplier:pr.supplier,
        stage:'Submitted',
        sourceOffer:offerId,
        createdAt:Date.now(),
        by:SEED.user.name
      });
    }catch(e){console.warn('Firestore write failed',e);}
  }
  renderShell();
  toast('✅ Converted '+offerId+' → new Purchase Request '+newId+' (Submitted)');
}

/* ---- Counter-offer modal ---- */
/**
 * Opens the counter-offer logging modal for the specified offer.
 * @param {string} offerId - Target offer ID.
 */
function openCounterModal(offerId){
  var offer=SEED.offers.find(function(o){return o.id===offerId;});
  if(!offer)return;
  counterTargetId=offerId;
  $('#coTitle').textContent='Log Counter-Offer — '+offerId;
  var metaEl=$('#coMeta');
  metaEl.textContent='';
  var line1=document.createTextNode(offer.supplier+' · '+offer.item);
  var br=document.createElement('br');
  var line2=document.createTextNode('Current total: '+fmtOMR(offer.price)+' OMR  ·  '+fmtOMR(offer.unit)+' '+offer.unitLabel);
  metaEl.appendChild(line1);metaEl.appendChild(br);metaEl.appendChild(line2);
  $('#coAmount').value='';
  $('#coNote').value='';
  openModal('counterModal');
}

/**
 * Saves the counter-offer entry to the offer's local notes array and persists to Firestore.
 */
function submitCounterOffer(){
  if(!counterTargetId)return;
  var amtRaw=$('#coAmount').value.trim();
  var note=$('#coNote').value.trim();
  if(!amtRaw){toast('Enter a counter amount');return;}
  var amount=parseFloat(amtRaw);
  if(isNaN(amount)||amount<=0){toast('Enter a valid positive amount');return;}

  var offer=SEED.offers.find(function(o){return o.id===counterTargetId;});
  if(!offer)return;
  if(!offer.notes){offer.notes=[];}

  var now=new Date('2026-06-03');
  var timeStr=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  var entry={amount:amount,note:note,time:timeStr,id:counterTargetId+'-N'+(offer.notes.length+1)};
  offer.notes.push(entry);

  if(db){
    try{
      db.collection('nexus_negotiations').add({
        offerId:counterTargetId,
        supplier:offer.supplier,
        counterAmount:amount,
        note:note,
        at:Date.now(),
        by:SEED.user.name
      });
    }catch(e){console.warn('Firestore negotiation write failed',e);}
  }

  closeModal('counterModal');
  renderOffersGrid();
  toast('Counter-offer logged for '+counterTargetId+' — '+fmtOMR(amount)+' OMR');
}

/* ---- Modal helpers ---- */
/**
 * Opens an overlay modal by ID.
 * @param {string} id - Element ID of the overlay.
 */
function openModal(id){$('#'+id).classList.add('open');}

/**
 * Closes an overlay modal by ID.
 * @param {string} id - Element ID of the overlay.
 */
function closeModal(id){$('#'+id).classList.remove('open');}

/* Close on overlay background click */
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.overlay').forEach(function(o){
    o.addEventListener('click',function(e){
      if(e.target===o){o.classList.remove('open');}
    });
  });
});

/* Close on Escape key */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(function(o){o.classList.remove('open');});
  }
});

/* ---- PWA ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('nexus-sw.js').catch(function(){});
  });
}

/* ---- boot ---- */
/**
 * Normalise a Firestore offer (incl. supplier-submitted public offers) into the
 * shape the cards expect. Demo offers already have `item` and pass through.
 * @param {object} o
 * @returns {object}
 */
function normOffer(o){
  if(o.item){return o;}
  return {
    id:o.id,
    supplier:o.supplierName||o.supplier||'Supplier',
    item:o.items||o.item||'',
    price:o.price||0,
    unit:o.unit||o.price||0,
    valid:o.validity||o.valid||'',
    status:o.status||'New',
    insight:o.insight||'',
    source:o.source||'manual',
    note:o.note||''
  };
}

/**
 * Application entry point — initialises all sub-systems.
 */
function boot(){
  if(!window.Nexus||!Nexus.requireAuth())return;
  if(!Nexus.guardSection('offers'))return;
  Nexus.applyIdentity();
  initTheme();
  renderShell();
  renderKPIs();
  renderOffersGrid();
  initSearch();
  initLive();
  Nexus.applyChrome('offers');
  Nexus.load([{name:'offers',apply:function(a){SEED.offers=a.map(normOffer);}}]).then(function(){renderKPIs();renderOffersGrid();renderShell();Nexus.applyChrome('offers');});
}

document.addEventListener('DOMContentLoaded',boot);
</script>
